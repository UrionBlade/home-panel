# Compose for Synology DSM (Container Manager).
#
# Expected layout on the NAS:
#   /volume1/docker/home-panel/
#   ├── docker-compose.yml        (this file, kept in sync by CI)
#   ├── apps/api/.env             (secrets, NEVER committed)
#   └── data/                     (SQLite DB, created on first run)
#
# On first deploy:
#   1. mkdir -p /volume1/docker/home-panel/data
#   2. Put secrets in /volume1/docker/home-panel/apps/api/.env
#   3. docker compose up -d
#
# CI keeps the image up-to-date:
#   docker compose pull && docker compose up -d

services:
  api:
    image: ${API_IMAGE:-ghcr.io/urionblade/home-panel-api:latest}
    container_name: home-panel-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: 0.0.0.0
      DATABASE_URL: /data/home-panel.sqlite
      BLINK_CLIPS_DIR: /clips/blink
      BLINK_CLIPS_RETENTION_DAYS: "30"
      # Talks to the MediaMTX sidecar for WebRTC control plane + RTSP
      # internal pull-target. Stays on the internal docker network;
      # nobody outside needs to reach :9997.
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_WEBRTC_URL: http://mediamtx:8889
      # MQTT bridge: the API subscribes to Z2M topics and proxies
      # pairing requests. Broker reachable only on the internal docker
      # network — nobody from the LAN can hit it directly.
      MQTT_URL: mqtt://mosquitto:1883
      ZIGBEE2MQTT_BASE_TOPIC: zigbee2mqtt
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./blink-clips:/clips/blink
    depends_on:
      - mediamtx
      - mosquitto
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # MediaMTX sidecar — relay RTSP→WebRTC per le IP camera di casa.
  # Path aggiunti / rimossi runtime dal backend via API HTTP :9997.
  # WebRTC ICE esposto su UDP :8189 (vedi docs per NAT traversal).
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: home-panel-mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      # WebRTC signaling (WHEP) — il frontend lo raggiunge via il proxy
      # dell'API; esposto all'host per poter debuggare dalla LAN.
      - "8889:8889"
      # UDP ICE per WebRTC peer-to-peer. Senza questa porta le candidate
      # non raggiungono il browser sulla LAN.
      - "8189:8189/udp"
    # L'image di MediaMTX è distroless: niente healthcheck perché
    # manca sia wget che curl e tenere un binary aggiuntivo è overkill.
    # Il monitoring effettivo lo facciamo dal backend via il control plane.

  # MQTT broker — used as the bus between the SONOFF Zigbee coordinator
  # (via Zigbee2MQTT) and the home-panel API. Bound to the internal
  # docker network only: there is no host port mapping, so nothing
  # outside the docker network can reach :1883.
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: home-panel-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  # Zigbee2MQTT — bridges the SONOFF ZBDongle-P (CC2652P) to MQTT.
  # The frontend on :8080 is exposed to the LAN for debug/mesh map only;
  # pairing and device control go through the home-panel API (which in
  # turn publishes to the bridge/request/* topics on the internal MQTT).
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    container_name: home-panel-zigbee2mqtt
    restart: unless-stopped
    depends_on:
      - mosquitto
    volumes:
      - ./zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    devices:
      # Sonoff ZBDongle-P. Cp210x driver is loaded at boot via
      # /usr/local/etc/rc.d/usb-serial-drivers.sh on the NAS, so the
      # dongle appears as /dev/ttyUSB0 once plugged into the Synology.
      # If you ever plug another USB-serial device in, switch to a
      # stable /dev/serial/by-id/* path instead.
      - "${ZIGBEE_SERIAL_PORT:-/dev/ttyUSB0}:/dev/ttyUSB0"
    environment:
      TZ: Europe/Rome
    ports:
      # Frontend Z2M (mappa mesh, log live, debug). LAN only —
      # niente reverse proxy esterno; per gestire i dispositivi si
      # passa per l'API home-panel.
      - "8080:8080"
