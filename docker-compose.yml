# Compose for Synology DSM (Container Manager).
#
# Expected layout on the NAS:
#   /volume1/docker/home-panel/
#   ├── docker-compose.yml        (this file, kept in sync by CI)
#   ├── apps/api/.env             (secrets, NEVER committed)
#   └── data/                     (SQLite DB, created on first run)
#
# On first deploy:
#   1. mkdir -p /volume1/docker/home-panel/data
#   2. Put secrets in /volume1/docker/home-panel/apps/api/.env
#   3. docker compose up -d
#
# CI keeps the image up-to-date:
#   docker compose pull && docker compose up -d

services:
  api:
    image: ${API_IMAGE:-ghcr.io/urionblade/home-panel-api:latest}
    container_name: home-panel-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: 0.0.0.0
      DATABASE_URL: /data/home-panel.sqlite
      BLINK_CLIPS_DIR: /clips/blink
      BLINK_CLIPS_RETENTION_DAYS: "30"
      # Talks to the MediaMTX sidecar for WebRTC control plane + RTSP
      # internal pull-target. Stays on the internal docker network;
      # nobody outside needs to reach :9997.
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_WEBRTC_URL: http://mediamtx:8889
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./blink-clips:/clips/blink
    depends_on:
      - mediamtx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # MediaMTX sidecar — relay RTSP→WebRTC per le IP camera di casa.
  # Path aggiunti / rimossi runtime dal backend via API HTTP :9997.
  # WebRTC ICE esposto su UDP :8189 (vedi docs per NAT traversal).
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: home-panel-mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      # WebRTC signaling (WHEP) — il frontend lo raggiunge via il proxy
      # dell'API; esposto all'host per poter debuggare dalla LAN.
      - "8889:8889"
      # UDP ICE per WebRTC peer-to-peer. Senza questa porta le candidate
      # non raggiungono il browser sulla LAN.
      - "8189:8189/udp"
    # L'image di MediaMTX è distroless: niente healthcheck perché
    # manca sia wget che curl e tenere un binary aggiuntivo è overkill.
    # Il monitoring effettivo lo facciamo dal backend via il control plane.
