# Compose pensato per Synology DSM (Container Manager / Portainer).
# Su Synology:
#   1. Clona la repo in /volume1/docker/home-panel
#   2. Crea la cartella dati: mkdir -p /volume1/docker/home-panel/data
#   3. docker compose up -d --build
#   4. Esponi la porta 3000 dietro il reverse proxy DSM (Control Panel → Login Portal → Advanced → Reverse Proxy)
#      o tramite Tailscale Funnel / Cloudflare Tunnel per l'accesso fuori casa.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: home-panel-api:latest
    container_name: home-panel-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: /data/home-panel.sqlite
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
