name: iOS TestFlight

on:
  # Fired by the release workflow when it bumps tauri.conf.json, so every
  # new version lands on TestFlight without a manual click.
  push:
    branches: [main]
    paths:
      - "apps/mobile/src-tauri/tauri.conf.json"
  # Manual trigger from the Actions tab.
  workflow_dispatch:
  # Every 2 months at 03:00 UTC on the 1st. TestFlight builds expire after 90
  # days; a 60-day cadence keeps the app alive on installed devices with
  # comfortable margin.
  schedule:
    - cron: "0 3 1 */2 *"

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build:
    name: Build and upload to TestFlight
    # As of 2026-04-29 Apple requires every TestFlight upload to be
    # compiled against the iOS 26 SDK, which only ships with Xcode 26+.
    # Xcode 26 lives on macos-15 (and macos-latest as runners roll
    # forward); macos-14 stays on Xcode 16 and produces builds App
    # Store Connect now rejects.
    runs-on: macos-15
    timeout-minutes: 60
    env:
      IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_API_TOKEN: ${{ secrets.VITE_API_TOKEN }}
      # Match gen/apple/project.yml deploymentTarget=14.0. Bumping
      # this to 17.0 promoted the final binary's LC_BUILD_VERSION
      # minos to 17.0, which made codesign on iOS treat the bundle
      # as Format=bundle (not Format=app bundle), Identifier degraded
      # to CFBundleName, and Apple's server-side validator rejected
      # the upload with 409 'not signed using submission certificate'.
      # The undefined Swift-compat symbols that 14.0 used to pull in
      # are stubbed out by swift_compat_stub.c.
      IPHONEOS_DEPLOYMENT_TARGET: "14.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (26+ required by Apple, fall back to 16)
        run: |
          echo "Available Xcodes:"
          ls -d /Applications/Xcode_*.app 2>/dev/null || true
          # Apple requires builds shipped to App Store Connect (TestFlight
          # included) to use the iOS 26 SDK, which only ships with Xcode
          # 26+. Xcode 16 also has a known codesign regression that
          # treats every bundle subcomponent (AppIcon*.png, Assets.car,
          # LaunchScreen.storyboardc, …) as signable nested code and
          # bails with `code object is not signed at all`. Xcode 26
          # fixes that emplace behaviour, so it's both the
          # policy-compliant AND the working choice. Deployment target
          # on the project is iOS 17 to avoid pulling in Swift
          # back-deploy libs (swiftCompatibility56/Concurrency/Packs)
          # that aren't shipped with Xcode 26's toolchain.
          # Prefer Xcode 26.2 over 26.3: 26.3 produces .app bundles
          # whose Mach-O isn't recognised as an "app bundle" by codesign
          # (Format=bundle invece di Format=app bundle), making any
          # re-sign degrade Identifier to CFBundleName ("Home Panel").
          # Apple's server-side validator then rejects the upload with
          # 409 'not signed using submission certificate'. Xcode 26.2
          # doesn't have this regression — verified locally on Mac, with
          # delivery 774cad10-a4da-4866-835a-76f98b1d7da7.
          candidates=$(ls -d /Applications/Xcode_26.2*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$candidates" ]; then
            echo "::warning::Xcode 26.2 not found on runner; falling back to latest Xcode 26.x but expect 409 from altool"
            candidates=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$candidates" ]; then
            echo "::warning::No Xcode 26 found, falling back to Xcode 16 — App Store Connect upload may be rejected and the codesign bug will reappear"
            candidates=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$candidates" ]; then
            echo "::error::No Xcode 16 or later found on runner"
            exit 1
          fi
          echo "Selected: $candidates"
          sudo xcode-select -s "$candidates"
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios | head -5

      # Xcode 26 ships the Swift back-deploy compat libs via a separate
      # MetalToolchain cryptex DMG that isn't auto-mounted on every
      # boot. When swift-rs / Tauri's Channel.swift compile they look
      # for libs under
      #   /Volumes/MetalToolchainCryptex/Metal.xctoolchain/usr/lib/swift-5.0/iphoneos
      # and fail to link with `swiftCompatibility56 not found` if the
      # mount is missing. `open dmg` doesn't actually mount on CI
      # (no GUI to confirm); use hdiutil with explicit mountpoint
      # matching the path the linker hard-codes when it goes looking.
      # Tracked in tauri-apps/tauri#14864.
      - name: Mount MetalToolchain cryptex
        run: |
          DMG=$(ls /System/Library/AssetsV2/com_apple_MobileAsset_MetalToolchain/*.asset/AssetData/Restore/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "::warning::No MetalToolchain DMG found, swift-rs link may fail"
            exit 0
          fi
          echo "Mounting $DMG at /Volumes/MetalToolchainCryptex"
          sudo hdiutil attach "$DMG" -nobrowse -readonly -mountpoint /Volumes/MetalToolchainCryptex
          ls /Volumes/MetalToolchainCryptex/Metal.xctoolchain/usr/lib/swift-5.0/iphoneos/ 2>&1 | head -20

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
          run_install: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      # Cache only the immutable bits (downloaded crates + git). The
      # build target/ directory holds .o / .a artefacts that bake in
      # the Swift ABI of the SDK they were compiled against — keeping
      # them around across an Xcode major-version bump leaves stale
      # `swiftCompatibility56` references in libapp.a that fail to
      # link against the new toolchain. Cheap to recompile compared
      # to debugging stale artefact issues.
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ios-registry-v2-${{ hashFiles('apps/mobile/src-tauri/Cargo.lock') }}
          restore-keys: cargo-ios-registry-v2-

      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/mobile

      - name: Run Fastlane release lane
        working-directory: apps/mobile
        run: bundle exec fastlane ios release

      - name: Upload IPA as artifact (for manual Transporter upload)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: home-panel-ipa
          path: apps/mobile/src-tauri/gen/apple/build/ipa/*.ipa
          if-no-files-found: warn
          retention-days: 7
