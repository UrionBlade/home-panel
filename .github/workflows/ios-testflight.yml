name: iOS TestFlight

on:
  # Fired by the release workflow when it bumps tauri.conf.json, so every
  # new version lands on TestFlight without a manual click.
  push:
    branches: [main]
    paths:
      - "apps/mobile/src-tauri/tauri.conf.json"
  # Manual trigger from the Actions tab.
  workflow_dispatch:
  # Every 2 months at 03:00 UTC on the 1st. TestFlight builds expire after 90
  # days; a 60-day cadence keeps the app alive on installed devices with
  # comfortable margin.
  schedule:
    - cron: "0 3 1 */2 *"

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build:
    name: Build and upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_API_TOKEN: ${{ secrets.VITE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (26+ required by Apple, fall back to 16)
        run: |
          echo "Available Xcodes:"
          ls -d /Applications/Xcode_*.app 2>/dev/null || true
          # As of April 28, 2026 Apple requires builds shipped to App
          # Store Connect (TestFlight included) to use the iOS 26 SDK,
          # which only ships with Xcode 26+. Xcode 16 also has a known
          # codesign bug that treats every bundle subcomponent
          # (AppIcon*.png, LaunchScreen.storyboardc, …) as signable
          # nested code and bails with `code object is not signed at
          # all`. Xcode 26 fixes that emplace behaviour, so it's both
          # the policy-compliant AND the working choice.
          candidates=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$candidates" ]; then
            echo "::warning::No Xcode 26 found, falling back to Xcode 16 — App Store Connect upload may be rejected and the codesign bug will reappear"
            candidates=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$candidates" ]; then
            echo "::error::No Xcode 16 or later found on runner"
            exit 1
          fi
          echo "Selected: $candidates"
          sudo xcode-select -s "$candidates"
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios | head -5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
          run_install: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/mobile/src-tauri/target
          key: cargo-ios-${{ hashFiles('apps/mobile/src-tauri/Cargo.lock') }}
          restore-keys: cargo-ios-

      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/mobile

      - name: Run Fastlane release lane
        working-directory: apps/mobile
        run: bundle exec fastlane ios release
