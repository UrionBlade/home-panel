name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "docker-compose.yml"
      - "mediamtx/**"
      - ".github/workflows/volume1/docker/home-panel.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/home-panel-api

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on NAS
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout (for compose file)
        uses: actions/checkout@v4

      - name: Sync compose + mediamtx config to deploy directory
        run: |
          install -m 644 docker-compose.yml /volume1/docker/home-panel/docker-compose.yml
          mkdir -p /volume1/docker/home-panel/mediamtx
          install -m 644 mediamtx/mediamtx.yml /volume1/docker/home-panel/mediamtx/mediamtx.yml

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

      - name: Pull latest image
        working-directory: /volume1/docker/home-panel
        run: docker compose pull api

      - name: Restart core services (api + mediamtx + mosquitto)
        working-directory: /volume1/docker/home-panel
        run: docker compose up -d api mediamtx mosquitto

      # Zigbee2MQTT can only start when the SONOFF dongle is enumerated
      # as /dev/ttyUSB0. When it's missing (NAS reboot before the user
      # plugs the stick back in, dongle relocated, …) we skip the start
      # instead of failing the deploy: api + mosquitto are independent
      # and must keep deploying. The next push (or workflow_dispatch)
      # picks up Z2M as soon as the device is back.
      - name: Start Zigbee2MQTT if the dongle is present
        working-directory: /volume1/docker/home-panel
        run: |
          PORT="${ZIGBEE_SERIAL_PORT:-/dev/ttyUSB0}"
          if [ -e "$PORT" ]; then
            echo "Found $PORT — bringing up zigbee2mqtt"
            docker compose up -d zigbee2mqtt
          else
            echo "Zigbee dongle not present at $PORT — skipping zigbee2mqtt"
            docker compose stop zigbee2mqtt 2>/dev/null || true
            docker compose rm -f zigbee2mqtt 2>/dev/null || true
          fi

      - name: Prune old images
        run: docker image prune -f

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 20); do
            status=$(docker inspect --format='{{.State.Health.Status}}' home-panel-api 2>/dev/null || echo "not-found")
            case "$status" in
              healthy)
                echo "Container healthy"
                exit 0
                ;;
              not-found|starting|"")
                echo "Status: $status ($i/20)"
                sleep 3
                ;;
              unhealthy)
                echo "Container reported unhealthy" >&2
                docker logs --tail=80 home-panel-api >&2
                exit 1
                ;;
              *)
                echo "Unexpected status: $status ($i/20)"
                sleep 3
                ;;
            esac
          done
          echo "Container did not become healthy in time" >&2
          docker logs --tail=80 home-panel-api >&2
          exit 1
