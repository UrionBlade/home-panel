# Pin iOS deployment floor to 14.0 (matches gen/apple/project.yml).
# Bumping to 17.0 here makes the Rust/Swift static libs compile with
# minos=17.0, the linker promotes the final binary to minos=17.0, and
# codesign on iOS treats minos>=17 + bundleId-leak conditions as
# "Format=bundle" instead of "Format=app bundle". Apple's server-side
# validator then rejects the upload with 409 'not signed using
# submission certificate'. Verified locally: minos=14.0 → Format=app
# bundle → upload OK (delivery 3f833668-2b1b-418d-8bf0-b3672e05e0d4).
# The undefined `__swift_FORCE_LOAD_$_swiftCompatibility*` symbols
# that 14.0 used to pull in are stubbed out by swift_compat_stub.c.
[env]
IPHONEOS_DEPLOYMENT_TARGET = "14.0"
