name: mobile
options:
  bundleIdPrefix: com.matteopoli.homepanel
  deploymentTarget:
    iOS: 15.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Home Panel
      PRODUCT_BUNDLE_IDENTIFIER: com.matteopoli.homepanel
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  mobile_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
      - path: mobile_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: Resources
        buildPhase: resources
        type: folder
        optional: true
      - path: LaunchScreen.storyboard
    info:
      path: mobile_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "0.1.0"
    entitlements:
      path: mobile_iOS/mobile_iOS.entitlements
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
        # Xcode 15+ defaults user scripts to sandboxed, which silently
        # blocks `xattr -cr` from touching the .app bundle in the
        # postBuildScript below. Disable sandboxing so the cleanup
        # script can actually run before CodeSign.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: pnpm tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a
    postBuildScripts:
      # Xcode 16's LinkAssetCatalog "emplaces" copies of AppIcon PNGs in
      # the bundle root for Spotlight / Settings / Notifications, and
      # tags them with com.apple.cs.* extended attributes that the
      # final CodeSign step then refuses to sign:
      #   Home Panel.app: code object is not signed at all
      #   In subcomponent: Home Panel.app/AppIcon60x60@2x.png
      #
      # The cleanup script needs to (a) run AFTER LinkAssetCatalog has
      # emplaced the PNGs and (b) finish BEFORE CodeSign runs. Two
      # mechanisms to enforce that:
      #   - inputFiles declares the bundle's Info.plist as input. Xcode
      #     waits for whatever build phase produces it (resources +
      #     asset catalog) before running this script.
      #   - outputFiles declares a stamp file so Xcode doesn't skip the
      #     phase on incremental builds AND knows it must complete
      #     before downstream phases (CodeSign) read the bundle.
      # Sandboxing must also be disabled at the build-settings level —
      # without it, `xattr -cr` is silently no-op'd by SIP.
      - script: |
          set -e
          APP="$BUILT_PRODUCTS_DIR/$WRAPPER_NAME"
          echo "[strip-xattr] cleaning $APP"
          xattr -cr "$APP"
          /usr/bin/touch "$DERIVED_FILE_DIR/strip-xattr.stamp"
          echo "[strip-xattr] done"
        name: Strip xattr from emplaced app icons
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(WRAPPER_NAME)/Info.plist
        outputFiles:
          - $(DERIVED_FILE_DIR)/strip-xattr.stamp