name: mobile
options:
  bundleIdPrefix: com.matteopoli.homepanel
  deploymentTarget:
    iOS: 17.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Home Panel
      PRODUCT_BUNDLE_IDENTIFIER: com.matteopoli.homepanel
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  mobile_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
      - path: mobile_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: Resources
        buildPhase: resources
        type: folder
        optional: true
      - path: LaunchScreen.storyboard
    info:
      path: mobile_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "0.1.0"
    entitlements:
      path: mobile_iOS/mobile_iOS.entitlements
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
        # Required so the postBuildScript below can rm the bundle's
        # emplaced AppIcon copies before CodeSign runs. Xcode 15+
        # defaults user scripts to sandboxed, which silently no-op's
        # rm against $BUILT_PRODUCTS_DIR.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # Xcode 26's CodeSign step keeps tripping on
        # "code object is not signed at all" against subcomponents
        # (Assets.car, embedded.mobileprovision, …) because each
        # nested item that codesign sees as signable has to already
        # carry a signature when the parent is signed. Pre-signing
        # one item only moves the failure to the next file. Pass
        # --deep so the main codesign descends into every subcomponent
        # in a single pass. The earlier --deep attempt (28e634c) was
        # reverted because exportArchive failed with "Missing Bundle
        # Identifier" — that root cause was the iOS 14 deployment
        # target leaving nested Swift frameworks without proper
        # CFBundleIdentifier; with iOS 17 + the swift_compat_stub
        # those nested items now have valid Info.plist metadata and
        # --deep should resolve cleanly.
        OTHER_CODE_SIGN_FLAGS: --deep
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: pnpm tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a
    postBuildScripts:
      # Pre-codesign cleanup that the main CodeSign step depends on:
      #
      # 1. Strip extended attributes — Xcode user scripts, asset catalog
      #    compiles and resource copies all leave xattrs that CodeSign
      #    treats as foreign code-signing metadata.
      #
      # 2. Remove the bundle-root AppIcon*.png copies that Xcode 16
      #    emplaces (a back-compat artefact for iOS < 13). With our
      #    iOS 17 deployment target Assets.car covers the runtime icon
      #    and the loose PNGs only confuse CodeSign with:
      #      "code object is not signed at all" / In subcomponent:
      #      Home Panel.app/AppIcon60x60@2x.png
      #    Xcode 26 doesn't emplace them so the loop is a no-op there.
      #
      # 3. Pre-sign every nested directory bundle (.storyboardc,
      #    .mlmodelc, .bundle, .framework). Xcode 26's ibtool --link
      #    started producing storyboardc bundles with embedded Swift
      #    glue, which CodeSign now treats as nested code that has to
      #    be signed before the main bundle pass:
      #      Home Panel.app: code object is not signed at all
      #      In subcomponent: Home Panel.app/LaunchScreen.storyboardc
      #    Same goes for the SpeakerECAPA.mlmodelc that build.rs drops
      #    into the bundle. We don't want --deep on the main CodeSign
      #    (it broke archive packaging with "Missing Bundle Identifier"
      #    in 28e634c), so handle the inner bundles explicitly here.
      #
      # inputFiles forces this phase to run AFTER the resources phase
      # emplaces everything and BEFORE the implicit CodeSign step.
      - script: |
          set -e
          APP="$BUILT_PRODUCTS_DIR/$WRAPPER_NAME"

          # 1. Remove the bundle-root AppIcon PNG copies. Xcode 26 (like
          #    Xcode 16) emplaces them as a back-compat artefact for
          #    iOS < 13 — devices on our iOS 17 deployment target read
          #    icons from Assets.car, so the loose PNGs serve no
          #    purpose, but CodeSign treats each one as a nested
          #    unsigned code object and bails:
          #      Home Panel.app: code object is not signed at all
          #      In subcomponent: Home Panel.app/AppIcon60x60@2x.png
          #    Targeted file removal works where `xattr -cr` did harm
          #    (stripping codesign-resource markers actool attaches to
          #    Assets.car and embedded.mobileprovision).
          for png in "$APP"/AppIcon*.png; do
            [ -f "$png" ] && rm -f "$png"
          done

          # 2. Inject a minimal Info.plist into every nested directory
          #    bundle that doesn't already have one. With --deep on the
          #    main CodeSign pass, every nested directory becomes a
          #    signed bundle, and `xcodebuild -exportArchive` then
          #    rejects the archive with "Missing Bundle Identifier" if
          #    any of those bundles has no CFBundleIdentifier.
          #    coremlcompiler's .mlmodelc is the obvious offender;
          #    storyboardc / nib bundles can be too on Xcode 26.
          find "$APP" -type d \
            \( -name "*.storyboardc" -o -name "*.mlmodelc" \
               -o -name "*.bundle" \) | while IFS= read -r nested; do
            plist="$nested/Info.plist"
            if [ ! -f "$plist" ]; then
              base=$(basename "$nested")
              # Strip the suffix to derive a unique identifier.
              stem="${base%.*}"
              cat > "$plist" <<PLIST
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleIdentifier</key>
    <string>com.matteopoli.homepanel.${stem}</string>
    <key>CFBundleName</key>
    <string>${stem}</string>
    <key>CFBundlePackageType</key>
    <string>BNDL</string>
    <key>CFBundleVersion</key>
    <string>1</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0</string>
</dict>
</plist>
PLIST
              echo "[plist] injected $plist"
            fi
          done

          # Debug: list every nested bundle and report whether it has
          # a CFBundleIdentifier. Helps diagnose Archive validation
          # failures before they happen.
          find "$APP" -type d \
            \( -name "*.storyboardc" -o -name "*.mlmodelc" \
               -o -name "*.bundle" -o -name "*.framework" -o -name "*.app" \) \
            | while IFS= read -r nested; do
              plist="$nested/Info.plist"
              if [ -f "$plist" ]; then
                id=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$plist" 2>/dev/null || echo "<missing>")
                echo "[bundle] $nested -> $id"
              else
                echo "[bundle] $nested -> <no Info.plist>"
              fi
            done

          /usr/bin/touch "$DERIVED_FILE_DIR/clean-icons.stamp"
        name: Pre-codesign bundle cleanup
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(WRAPPER_NAME)/Info.plist
        outputFiles:
          - $(DERIVED_FILE_DIR)/clean-icons.stamp